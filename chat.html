<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJY 财务AI助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 SJY 财务AI助手</h1>
            <p>浙江数智交院科技股份有限公司</p>
        </header>

        <!-- 标签切换 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="knowledge">📚 制度知识库</button>
            <button class="tab-btn" data-tab="analysis">📊 财务智能分析</button>
        </div>

        <!-- 制度知识库 -->
        <div class="tab-content active" id="knowledge-tab">
            <div class="chat-container">
                <div id="knowledge-messages" class="chat-messages">
                    <div class="message bot-message">
                        <div class="message-content">
                            <p>您好！我是财务制度知识库助手。</p>
                            <p>您可以问我关于公司财务制度的问题，例如：</p>
                            <ul>
                                <li>去北京出差的住宿费标准是多少？</li>
                                <li>差旅费如何报销？</li>
                                <li>采购流程是什么？</li>
                                <li>费用审批权限？</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="input-container">
                    <input 
                        type="text" 
                        id="knowledge-input" 
                        placeholder="请输入您的问题..." 
                        autocomplete="off"
                    >
                    <button id="knowledge-send-btn">发送</button>
                </div>
            </div>
        </div>

        <!-- 财务智能分析 -->
        <div class="tab-content" id="analysis-tab">
            <div class="chat-container">
                <div id="analysis-messages" class="chat-messages">
                    <div class="message bot-message">
                        <div class="message-content">
                            <p>您好！我是财务智能分析助手。</p>
                            <p>您可以问我关于公司财务数据的问题，例如：</p>
                            <ul>
                                <li>公司合同总额是多少？</li>
                                <li>最新的资产负债率是多少？</li>
                                <li>2026年Q1的净利润是多少？</li>
                                <li>收款率情况如何？</li>
                                <li>现金流是否健康？</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="input-container">
                    <input 
                        type="text" 
                        id="analysis-input" 
                        placeholder="请输入您的问题..." 
                        autocomplete="off"
                    >
                    <button id="analysis-send-btn">发送</button>
                </div>
            </div>
        </div>

        <footer>
            <p>💡 提示：本系统基于公司最新财务制度与财务数据（更新至2026年3月）</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
