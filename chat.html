<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务制度知识库 - 问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header .username {
            font-size: 14px;
        }

        .header .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .header .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message .bubble {
            display: inline-block;
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
            text-align: left;
        }

        .message .sources {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }

        .message .sources strong {
            display: block;
            margin-bottom: 4px;
        }

        .bubble.thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-style: italic;
        }

        .thinking-dots {
            display: flex;
            gap: 4px;
        }

        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-area {
            display: flex;
            gap: 12px;
            background: white;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: translateY(-2px);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 财务制度知识库</h1>
        <div class="user-info">
            <span class="username" id="username"></span>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="empty-state">
                <h2>👋 你好！</h2>
                <p>我可以帮你查询财务制度相关问题</p>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="questionInput" placeholder="请输入你的问题，例如：北京出差住宿费标准" />
            <button id="sendBtn" onclick="sendQuestion()">发送</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // 检查登录状态
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');

        if (!token || !username) {
            window.location.href = 'login.html';
        }

        document.getElementById('username').textContent = username;

        const messagesDiv = document.getElementById('messages');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');

        // 回车发送
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendQuestion();
            }
        });

        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;

            // 清空输入框
            questionInput.value = '';
            sendBtn.disabled = true;

            // 清空欢迎信息
            const emptyState = messagesDiv.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // 显示用户问题
            addMessage('user', question);

            // 显示思考状态
            const thinkingId = addThinkingMessage();

            try {
                const response = await fetch(`${CONFIG.apiUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token, question })
                });

                const data = await response.json();

                // 移除思考状态
                removeThinkingMessage(thinkingId);

                if (data.success) {
                    addMessage('assistant', data.answer, data.sources, data.files);
                } else {
                    throw new Error(data.error || '查询失败');
                }
            } catch (error) {
                // 移除思考状态
                removeThinkingMessage(thinkingId);
                addMessage('assistant', `❌ 错误：${error.message}`);
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }

        function addThinkingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'thinking-message';

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble thinking';
            bubbleDiv.innerHTML = `
                正在思考
                <div class="thinking-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            messageDiv.appendChild(bubbleDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return 'thinking-message';
        }

        function removeThinkingMessage(id) {
            const thinkingMsg = document.getElementById(id);
            if (thinkingMsg) {
                thinkingMsg.remove();
            }
        }

        function addMessage(role, text, sources = [], files = []) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            
            // 移除文本中的 [FILE:xxx] 标记
            const cleanText = text.replace(/\[FILE:[^\]]+\]/g, '').trim();
            bubbleDiv.textContent = cleanText;

            messageDiv.appendChild(bubbleDiv);

            // 显示参考文档
            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                sourcesDiv.innerHTML = `<strong>📄 参考文档：</strong>${sources.join(', ')}`;
                messageDiv.appendChild(sourcesDiv);
            }

            // 显示可下载文件
            if (files && files.length > 0) {
                const filesDiv = document.createElement('div');
                filesDiv.className = 'sources';
                filesDiv.innerHTML = `<strong>📎 可下载文件：</strong>`;
                
                files.forEach(file => {
                    const downloadBtn = document.createElement('button');
                    downloadBtn.textContent = `📥 ${file}`;
                    downloadBtn.style.cssText = `
                        margin: 5px 5px 0 0;
                        padding: 8px 16px;
                        background: #007bff;
                        color: white;
                        border: none;
                        border-radius: 4px;
                        cursor: pointer;
                        font-size: 13px;
                    `;
                    downloadBtn.onclick = () => downloadFile(file);
                    filesDiv.appendChild(downloadBtn);
                });
                
                messageDiv.appendChild(filesDiv);
            }

            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function downloadFile(filename) {
            const token = localStorage.getItem('token');
            const url = `${CONFIG.apiUrl}/api/download?token=${encodeURIComponent(token)}&file=${encodeURIComponent(filename)}`;
            window.open(url, '_blank');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
